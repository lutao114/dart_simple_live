name: Android Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    env:
      ACTIONS_ALLOW_UNSECURE_NODE_VERSION: true
    steps:
      - name: 拉取源码
        uses: actions/checkout@v4

      - name: 配置 JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 配置 Flutter（固定兼容版本）
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.24.0
          channel: stable
          cache: true

      - name: 安装依赖
        working-directory: ./simple_live_app
        run: flutter pub get

      - name: 配置 Kotlin 版本（解决不兼容）
        working-directory: ./simple_live_app/android
        run: |
          echo -e "ext.kotlin_version = '1.9.20'" >> build.gradle
          echo -e "storePassword=\nkeyPassword=\nkeyAlias=\nstoreFile=" > key.properties

      - name: 编译安卓正式包
        working-directory: ./simple_live_app
        run: flutter build apk --release --no-tree-shake-icons

      - name: 上传安装包
        uses: actions/upload-artifact@v4
        with:
          name: SimpleLive-APK
          path: simple_live_app/build/app/outputs/flutter-apk/app-release.apk
